[Activation]
; First Button - The key you HOLD before pressing Second Button
; Scan codes: 0x2A = Left Shift, 0x36 = Right Shift
;             0x1D = Left Ctrl, 0x1C = Right Ctrl
;             0x38 = Left Alt
FirstKey = 0x2A

; Second Button - The key you PRESS while holding First Button
; Scan codes: 0x1E = A, 0x30 = B, 0x2E = C, 0x20 = D, 0x12 = E
;             0x21 = F, 0x22 = G, 0x23 = H, 0x17 = I, 0x24 = J
;             0x25 = K, 0x26 = L, 0x32 = M, 0x31 = N, 0x18 = O
;             0x19 = P, 0x10 = Q, 0x13 = R, 0x1F = S, 0x14 = T
;             0x16 = U, 0x2F = V, 0x11 = W, 0x2D = X, 0x15 = Y, 0x2C = Z
SecondKey = 0x1E

; Single Key Mode - Activate hub with just Second Button
; Set to true to use only SecondKey, false to require FirstKey+SecondKey
SingleKeyMode = false

[Audio]
; Volume for hub sounds (bell, swoosh, heal, open/close)
; Range: 0 to 100 (0 = mute, 100 = max)
Volume = 70

; Mute hub sound (open/close)
; Set to true to mute the hub sound, false to hear it
MuteHubSound = false

; Hub sound file (miau-PDA.wav or swoosh-07.wav)
HubSound = miau-PDA.wav

[Position]
; Hub screen position (percentage)
; Range: 0 to 100 (50 = center)
; Drag the hub header to move it, position saves automatically
PosX = 50
PosY = 50

[Display]
; Hub size multiplier (percentage)
; Range: 50 to 200 (100 = normal size)
; Use +/- buttons in hub to adjust
HubSize = 100

[PanelGif]
; GIF Panel visibility
; Set to true to show on startup, false to hide
gifVisible = false

; GIF Panel screen position (percentage)
; Range: 0 to 100
gifPosX = 60
gifPosY = 50

; GIF zoom multiplier (percentage)
; Range: 50 to 200 (100 = normal size)
gifZoom = 100

; GIF Panel size (pixels)
gifWidth = 180
gifHeight = 180

[PanelVideo]
; Video Panel visibility
; Set to true to show on startup, false to hide
videoVisible = false

; Video Panel screen position (percentage)
; Range: 0 to 100
videoPosX = 70
videoPosY = 50

; Video Panel size (pixels)
videoWidth = 320
videoHeight = 240

; Video panel opacity (20-100%)
; Controls transparency of the video panel
videoOpacity = 100

; Video audio volume (0-100%)
; Independent from main hub volume
videoVolume = 70

; Video fullscreen state
; Set to true if video was in fullscreen when closed
videoFullscreen = false

[PanelLogs]
; Logs Panel visibility
; Set to true to show on startup, false to hide
logsVisible = false

; Logs Panel screen position (percentage)
; Range: 0 to 100
logsPosX = 50
logsPosY = 50

; Logs Panel width (pixels)
logsWidth = 400
logsHeight = 300

; Logs font size (8-18)
logsFontSize = 10

; Auto-refresh logs every 2 seconds
logsAutoRefresh = true

[PanelLive]
; Live Stats Panel visibility
; Set to true to show on startup, false to hide
liveVisible = false

; Live Panel screen position (percentage)
; Range: 0 to 100
livePosX = 80
livePosY = 50

; Live Panel size multiplier (percentage)
; Range: 50 to 200 (100 = normal size)
liveSize = 100
[PanelDice]
; Dice Panel visibility
; Set to true to show on startup, false to hide
diceVisible = false

; Dice Panel screen position (percentage)
; Range: 0 to 100
dicePosX = 50
dicePosY = 50

; Dice type (4, 6, 8, 10, 12, 20)
diceCurrentSides = 6

; Dice Panel scale multiplier (percentage)
; Range: 50 to 200 (100 = normal size)
diceScale = 100
; Dice material style (wood_light, wood, gold, bone, stone)
diceMaterial = bone

[GlobalStyle]
; Background opacity (20-100%)
; Controls transparency of hub and all panels
globalAlpha = 97

; Color theme (default, gold, dark, blood, nature)
; Changes accent colors throughout the UI
globalColor = default

; Panel Live background image
; Options: default, frame-v1
liveBackground = default
